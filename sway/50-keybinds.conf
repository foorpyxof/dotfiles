set $refresh_bar true
set $lockscreen swaylock
set $screenshot slurp | grim -g - - | wl-copy
set $exit_cmd "swaynag -t warning -m 'Exit sway? This will end your Wayland session.' -B 'Yes, exit sway' 'swaymsg exit'"
set $zoomer pkill -x woomer || woomer

include ../i3_sway/keybinds.conf

# move tiling windows via drag & drop by left-clicking
# anywhere into the window while holding the floating modifier.
tiling_drag modifier
