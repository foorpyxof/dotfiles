# set $exec exec --no-startup-id
set $lockscreen betterlockscreen -l
set $background_command ~/.fehbg

exec_always xset r rate 270 30 &
exec pasystray
exec dunst &
exec xidlehook --not-when-audio --not-when-fullscreen --timer 600 "$lockscreen" "" &
exec numlockx

exec_always xrdb -merge ~/.Xresources

# Start i3bar to display a workspace bar (plus the system information i3status
# finds out, if available)
bar {
  position top
        status_command i3status
}

include ../i3_sway/autostart.conf
